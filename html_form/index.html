<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Data Collection Form</title>
</head>

<body>
    <form>
        <table border="1" cellpadding="5" cellspacing="0" width="400">
            <tr>
                <th colspan="3">PERSON PROFILE</th>
            </tr>
            <tr>
                <td>Name</td>
                <td><input type="text" name="name"></td>
                <td></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="email" name="email"></td>
                <td></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="g" value="m"> Male
                    <input type="radio" name="g" value="f"> Female
                    <input type="radio" name="g" value="o"> Other
                </td>
                <td></td>
            </tr>
            <tr>
                <td>Date of Birth</td>
                <td>
                    <input type="text" size="2"> / <input type="text" size="2"> / <input type="text" size="4">
                    <i>(dd/mm/yyyy)</i>
                </td>
                <td></td>
            </tr>
            <tr>
                <td>Blood Group</td>
                <td>
                    <select name="bg">
                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>AB+</option>
                        <option>AB-</option>
                        <option>O+</option>
                        <option>O-</option>

                    </select>
                </td>
                <td></td>
            </tr>
            <tr>
                <td>Degree</td>
                <td>
                    <input type="checkbox"> SSC <input type="checkbox"> HSC
                    <input type="checkbox"> BSc. <input type="checkbox"> MSc.
                </td>
                <td></td>
            </tr>
            <tr>
                <td>Photo</td>
                <td><input type="file"></td>
                <td></td>
            </tr>
            <tr>
                <td colspan="3" align="right">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>
    </form>
</body>

</html>
