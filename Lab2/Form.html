<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <label for="name">Name</label>
        <input type="text"><br>
        <input type="submit" value="Submit">
    </form>

    <form>
        <label for="name">Email</label>
        <input type="email"><br>
        <input type="submit" value="Submit">
    </form>

    <form>
        <fieldset>
            <legend>Gender</legend>
            <input type="radio" name="gender" id="male" value="male">
            <label for="male">Male</label>

            <input type="radio" name="gender" id="female" value="male">
            <label for="female">Female</label>
            <input type="radio" name="gender" id="other" value="male">
            <label for="other">other</label>


        </fieldset>
        <input type="submit" value="Submit">
    </form>

    <form>
        <fieldset>
            <legend>Date of Birth</legend>
            &nbsp; dd &nbsp;&nbsp; mm &nbsp;&nbsp; yyyy<br>
            <input type="text" name="dd" size="2">
            <input type="text" name="mm" size="3">
            <input type="text" name="yyyy" size="6">
        </fieldset>
        <input type="submit" value="Submit">
    </form>

    <form>
        <fieldset>
            <legend>Degree</legend>

            <input type="checkbox" name="SSC">
            <label for="SSC">SSC</label>
            <input type="checkbox" name="HSC">
            <label for="HSC">SSC</label>
            <input type="checkbox" name="Bsc">
            <label for="Bsc">Bsc</label>
        </fieldset>
        <input type="submit" value="Submit">
    </form>

    <form>
        <label for="blood">Blood Group</label>
        <select name="blood" id="blood">
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
        </select><br>
        <input type="submit" value="Submit">
    </form>

    <form>
        <fieldset>
            <legend>Profile Picture</legend>
            <label for="User">User Id</label>
            <input type="text">
            <br><br>
            <label for="Picture">Picture</label>
            <input type="file" name="Picture">
        </fieldset>
    </form>
    <input type="submit" value="Submit">


</body>

</html>
