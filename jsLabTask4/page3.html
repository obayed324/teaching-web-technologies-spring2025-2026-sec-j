<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gender Verification</title>
</head>
<body>

    <fieldset style="width: 30%;">
        <legend>Gender</legend>

        <input type="radio" name="gender" id="male" value="Male">
        <label for="male">Male</label>

        <input type="radio" name="gender" id="female" value="Female">
        <label for="female">Female</label>

        <input type="radio" name="gender" id="other" value="Other">
        <label for="other">Other</label>
    </fieldset>

    <br>
    <span id="error" style="color:red;"></span><br><br>
    <input type="button" value="Submit" onclick="validateGender()">

    <script>
        function validateGender() {
            let radios = document.getElementsByName("gender");
            let error = document.getElementById("error");
            error.innerText = "";

            let selected = false;

            
            for (let i = 0; i < radios.length; i++) {
                if (radios[i].checked) {
                    selected = true;
                    break;
                }
            }

            if (!selected) {
                error.innerText = "Please select at least one gender.";
                return false;
            }

            alert("Gender selection is valid!");
            return true;
        }
    </script>

</body>
</html>
