<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Validation</title>
</head>

<body>

    <label for="name">Name</label><br>
    <input type="text" id="name"><br>
    <span id="error" style="color:red;"></span><br><br>

    <input type="button" value="Submit" onclick="validateName()">

    <script>
        function validateName() {
            let firstName = document.getElementById("name").value.trim();
            let error = document.getElementById("error");

            error.innerText = "";

            
            if (firstName === "") {
                error.innerText = "Name cannot be empty.";
                return false;
            }

            
            let words = firstName.split(" ");
            let wordCount = 0;

            for (let i = 0; i < words.length; i++) {
                if (words[i] !== "") {
                    wordCount++;
                }
            }

            if (wordCount < 2) {
                error.innerText = "Name must contain at least two words.";
                return false;
            }

            
            for (let i = 0; i < firstName.length; i++) {
                let ch = firstName[i];

                if (!(
                    (ch >= 'A' && ch <= 'Z') ||
                    (ch >= 'a' && ch <= 'z') ||
                    ch === '.' ||
                    ch === '-' ||
                    ch === ' '
                )) {
                    error.innerText = "Only letters, dot(.) and dash(-) are allowed.";
                    return false;
                }
            }

            let firstChar = firstName[0];
            if (!((firstChar >= 'A' && firstChar <= 'Z') ||
                  (firstChar >= 'a' && firstChar <= 'z'))) {
                error.innerText = "Name must start with a letter.";
                return false;
            }
            alert("Validation Successful!");
            return true;
        }
    </script>

</body>
</html>
