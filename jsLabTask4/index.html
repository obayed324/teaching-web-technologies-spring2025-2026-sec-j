<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PERSON PROFILE</title>

    <style>
        table {
            border-collapse: collapse;
            width: 600px;
        }
        td, th {
            border: 1px solid black;
            padding: 10px;
        }
        input[type="text"], input[type="email"] {
            width: 100px;
        }
        fieldset {
            border: none;
        }
    </style>
</head>

<body>

    <form id="profileForm" onsubmit="return validateAll()">
        <table>
            <thead>
                <th colspan="3" style=" font-size: large;">PERSON PROFILE</th>
            </thead>
            <tr>
                <td>Name</td>
                <td><input style="width: 200px;" type="text" id="name"></td>
                <td id="nameErr" style="color:red;"></td>
            </tr>

            <tr>
                <td>Email</td>
                <td><input style="width: 200px;" type="email" id="email"></td>
                <td id="emailErr" style="color:red;"></td>
            </tr>

            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="gender" value="Male"> Male
                    <input type="radio" name="gender" value="Female"> Female
                    <input type="radio" name="gender" value="Other"> Other
                </td>
                <td id="genderErr" style="color:red;"></td>
            </tr>

            <tr>
                <td>Date of Birth</td>
                <td>
                    <input type="text" id="dd" size="2"> /
                    <input type="text" id="mm" size="2"> /
                    <input type="text" id="yyyy" size="4">
                    (dd/mm/yyyy)
                </td>
                <td id="dobErr" style="color:red;"></td>
            </tr>

            <tr>
                <td>Blood Group</td>
                <td>
                    <select id="blood">
                        <option>A+</option><option>A-</option>
                        <option>B+</option><option>B-</option>
                        <option>AB+</option><option>AB-</option>
                        <option>O+</option><option>O-</option>
                    </select>
                </td>
                <td id="bloodErr" style="color:red;"></td>
            </tr>

            <tr>
                <td>Degree</td>
                <td>
                    <input type="checkbox" id="ssc"> SSC
                    <input type="checkbox" id="hsc"> HSC
                    <input type="checkbox" id="bsc"> BSc
                </td>
                <td id="degreeErr" style="color:red;"></td>
            </tr>

            <tr>
                <td>Photo</td>
                <td>
                    <input type="file" id="photo">
                </td>
                <td id="photoErr" style="color:red;"></td>
            </tr>

            <tr>
                <td colspan="3" style="text-align:right;">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>
    </form>

    <script src="profile.js"></script>

</body>
</html>
